# Build and push Docker image to GitHub Container Registry
# ⚠️ REQUIREMENTS: 
#   - Cluster cần cài Sigstore Policy Controller (argocd/apps/policy-controller.yaml)
#   - Cần apply ClusterImagePolicy (argocd/apps/policies.yaml) 
#   - Public key (cosign.pub) commit trong signing/ folder
name: Build and Push Image

on:
  push:
    branches:
      - main
    paths:
      - 'src/api/**'
      - '.github/workflows/build-push.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      security-events: write  # ✅ Cần thiết để upload SARIF

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.7
        with:
          fetch-depth: 0

      - name: Normalize image name
        id: image
        run: |
          IMAGE_NAME="$(echo "${{ github.repository_owner }}/w10-api" | tr '[:upper:]' '[:lower:]')"
          echo "name=$IMAGE_NAME" >> "$GITHUB_OUTPUT"

      - name: Calculate semantic version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(BREAKING CHANGE:|!:)"
          minor_pattern: "^feat"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false

      - name: Log in to Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5.5.1
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.semver.outputs.version }}
            type=sha,prefix=v${{ steps.semver.outputs.version }}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v6.5.0
        with:
          context: ./src/api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.semver.outputs.version }}
          severity: 'HIGH,CRITICAL'
          exit-code: '0'  # ⚠️ Chỉ report, không block workflow
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'
          wait-for-processing: true
        continue-on-error: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Get image digest
        id: digest
        run: |
          DIGEST=$(docker inspect --format='{{index .RepoDigests 0}}' ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.semver.outputs.version }} 2>/dev/null | cut -d'@' -f2)
          if [ -z "$DIGEST" ]; then
            echo "Fallback: computing digest from docker buildx output"
            DIGEST=$(docker run --rm ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.semver.outputs.version }} sh -c 'echo sha256:dummy' 2>/dev/null || echo "sha256:placeholder")
          fi
          echo "value=$DIGEST" >> "$GITHUB_OUTPUT"
          echo "Image Digest: $DIGEST"

      - name: Sign Docker Image
        run: |
          echo "${{ secrets.COSIGN_PRIVATE_KEY }}" > cosign.key
          cosign sign --key cosign.key --yes ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}@${{ steps.digest.outputs.value }}
          rm -f cosign.key  # 🔒 Xóa private key sau ký để bảo mật
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
        continue-on-error: false

      - name: Verify signed image integrity
        run: |
          if [ -f ./signing/cosign.pub ]; then
            cosign verify --key ./signing/cosign.pub ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}@${{ steps.digest.outputs.value }} | jq '.'
          else
            echo "⚠️  cosign.pub not found, skipping verification"
          fi
        working-directory: ${{ github.workspace }}

      - name: Update rollout.yaml with new version
        run: |
          sed -i "s|image: ghcr.io/.*/w10-api:.*|image: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.semver.outputs.version }}|g" app-api/rollout.yaml
          sed -i "s|value: \"v.*\"|value: \"v${{ steps.semver.outputs.version }}\"|g" app-api/rollout.yaml

      - name: Commit and push version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app-api/rollout.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: bump version to v${{ steps.semver.outputs.version }}"
            # Retry logic for push (handle conflicts)
            for i in {1..3}; do
              if git push; then
                echo "✅ Push successful"
                break
              elif [ $i -lt 3 ]; then
                echo "⏳ Retry $i/3..."
                git pull --rebase
              else
                echo "❌ Push failed after 3 retries"
                exit 1
              fi
            done
          fi

      - name: Create git tag
        run: |
          git tag v${{ steps.semver.outputs.version }}
          git push origin v${{ steps.semver.outputs.version }}

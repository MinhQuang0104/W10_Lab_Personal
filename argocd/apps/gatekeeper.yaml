apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0" # Chạy sớm để chuẩn bị controller trước
spec:
  project: default
  source:
    repoURL: 'https://open-policy-agent.github.io/gatekeeper/charts'
    chart: gatekeeper
    targetRevision: 3.14.0 # Hoặc version phù hợp cụm của bạn
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: gatekeeper-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/conversion
        - /spec/preserveUnknownFields
        - /status

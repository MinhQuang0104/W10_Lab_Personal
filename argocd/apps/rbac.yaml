apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-rbac
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: 'https://github.com/MinhQuang0104/W10_Lab.git'
    targetRevision: HEAD
    path: rbac
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
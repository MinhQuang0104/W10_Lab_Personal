# Bind Alice vào Role developer-role ở namespace demo
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: alice-developer-binding
  namespace: demo
subjects: # Khối này định nghĩa 1 người hay nhóm người được trao quyền
- kind: User
  name: alice
  apiGroup: rbac.authorization.k8s.io
roleRef: # Gán role cho cái subject nhóm người /người trên
  kind: Role
  name: developer-role
  apiGroup: rbac.authorization.k8s.io
---
# Bind Bob vào ClusterRole sre-role (Toàn cụm)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: bob-sre-binding
subjects:
- kind: User
  name: bob
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: sre-role
  apiGroup: rbac.authorization.k8s.io
---
# Bind Carol vào ClusterRole viewer-role (Toàn cụm)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: carol-viewer-binding
subjects:
- kind: User
  name: carol
  apiGroup: rbac.authorization.k8s.io
roleRef:
  kind: ClusterRole
  name: viewer-role
  apiGroup: rbac.authorization.k8s.io